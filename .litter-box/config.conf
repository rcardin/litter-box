# litter-box config for litter-box's own repo. The loop runs on itself, so this file is both the
# real configuration of that run and the worked example of the schema in src/Settings.scala.
#
# Anything omitted falls back to Settings.Reference; the keys below are set because this repo
# genuinely differs from a plain consumer repo (it IS the loop, so its gate and its protected
# paths are its own).

instance-name = "litter-box"
conventions   = ".litter-box/prompts/conventions.md"
stop-file     = "STOP.md"
log-dir       = ".litter-box/logs"

gate {
  # This repo is a scala-cli project, not an sbt one; the tool is installed by
  # .litter-box/Dockerfile and the command below is run against the image's PATH, not the host's.
  #
  # Was `sandbox/run-fast-gate.sh` — the runner script named directly as the gate command, from
  # when this repo's own `sandbox/` was the only one that existed. The runner is not a repo path
  # any more (#9): `sandboxed = true` is how a repo asks for it, and the loop supplies the script.
  #
  # Two flags the host build does not need, both about the sandbox rather than about the build:
  #   --server=false  compile in-process instead of starting a Bloop build server. A throwaway
  #                   container gains nothing from a long-lived server, and Bloop resolves its own
  #                   frontend from repo.scala-lang.org, which the allowlist does not carry.
  #   --jvm system    use the image's temurin 21 rather than provisioning a JVM, which would mean
  #                   fetching coursier's jvm-index from github.com — an egress hole opened to get
  #                   a JDK that is already installed.
  fast      = "scala-cli test . --server=false --jvm system"
  sandboxed = true
  timeout   = 900
}

ci { required-check = "test" }

issues.labels { ready = "ready", active = "in-progress", blocked = "blocked" }

# The patch guard. Keeps the pre-config list verbatim (CI workflows, the loop's own code and
# prompts, the control files) and adds `.litter-box` itself — including THIS file, so the agent
# cannot widen its own guard.
#
# `src` is deliberately absent: it holds the loop's own sources, but it is also the conventional
# source root of the repo the loop works on, so protecting it would reject every legitimate patch.
protect = [
  ".litter-box/**",
  ".github/**",
  "sandbox/**",
  "lib/**",
  # Holds the prompt skeletons (the VERDICT: contract, the no-gh rule, "you do not report
  # success") AND, since #9, the sandbox scripts that build the images and run the containers.
  # `//> using resourceDir ./resources` puts this tree on the classpath, so an agent that could
  # rewrite it could widen its own constraints — or its own egress — on the very next iteration.
  "resources/**",
  "docs/**",
  "project.scala",
  "watch.sh",
  "tail-claude.sh",
  "STOP.md"
]

budgets  { repair = 2, max-patch-bytes = 1000000 }
timeouts { iter = 1800, ci-wait = 900, ci-appear = 300, ci-appear-interval = 10 }
