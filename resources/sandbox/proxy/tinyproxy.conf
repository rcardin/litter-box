# version: 2
# Egress allowlist for the FAST-gate sandbox (issue #34). Both this file and ./allowlist are baked
# into the proxy image, so neither is read at run time. Applying an edit is start-proxy.sh's job
# now (issue #14): it recreates the container on every start and rebuilds the image whenever the
# running proxy is enforcing an allowlist other than the effective one, so the manual rebuild and
# restart this comment used to prescribe are gone.
User tinyproxy
Group tinyproxy
Port 8888
Listen 0.0.0.0
Timeout 600
LogLevel Info
MaxClients 50
# No `Allow` lines: this proxy only ever listens on litter-box-net, a Docker `--internal`
# network with no route to the outside world, so every peer that can reach it at all is
# already a gate container on the same isolated network — see harness/sandbox/start-proxy.sh.
Filter "/etc/tinyproxy/allowlist"
FilterType fnmatch
FilterDefaultDeny Yes
# CONNECT (HTTPS) requests are filtered on the requested hostname (tinyproxy never decrypts
# the tunnel), so plain hostnames in ./allowlist cover Maven Central's and Anthropic's TLS
# endpoints with no MITM required. (FilterExtended is deprecated in favor of FilterType as of
# tinyproxy 1.11 — verified empirically against the alpine:3.20 tinyproxy package.)
